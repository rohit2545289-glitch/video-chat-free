        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Theme Variables */
        :root {
            --bg-gradient-start: #0f0c29;
            --bg-gradient-middle: #302b63;
            --bg-gradient-end: #24243e;
            --card-bg: rgba(255, 255, 255, 0.1);
            --text-primary: white;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --border-color: rgba(255, 255, 255, 0.2);
            --accent-color: #4ade80;
            --accent-hover: #22c55e;
            --status-online: #4ade80;
            --status-offline: #ef4444;
            --history-border: #fbbf24;
        }

        /* Light Theme */
        body.theme-light {
            --bg-gradient-start: #f5f7fa;
            --bg-gradient-middle: #e4e8f0;
            --bg-gradient-end: #d9e0e8;
            --card-bg: rgba(0, 0, 0, 0.05);
            --text-primary: #1a1a2e;
            --text-secondary: #4a5568;
            --border-color: rgba(0, 0, 0, 0.1);
            --accent-color: #10b981;
            --history-border: #f59e0b;
        }

        /* Blue Theme */
        body.theme-blue {
            --bg-gradient-start: #1e3c72;
            --bg-gradient-middle: #2a5298;
            --bg-gradient-end: #1e3c72;
            --accent-color: #60a5fa;
            --history-border: #60a5fa;
        }

        /* Green Theme */
        body.theme-green {
            --bg-gradient-start: #064e3b;
            --bg-gradient-middle: #047857;
            --bg-gradient-end: #065f46;
            --accent-color: #34d399;
            --history-border: #34d399;
        }

        /* Purple Theme */
        body.theme-purple {
            --bg-gradient-start: #4c1d95;
            --bg-gradient-middle: #6d28d9;
            --bg-gradient-end: #5b21b6;
            --accent-color: #c084fc;
            --history-border: #c084fc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-middle), var(--bg-gradient-end));
            min-height: 100vh;
            padding: 16px;
            transition: background 0.3s ease;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 12px 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .back-btn:active {
            transform: scale(0.95);
        }

        .header-info h1 {
            color: var(--text-primary);
            font-size: 18px;
        }

        .header-info p {
            color: var(--text-secondary);
            font-size: 10px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Theme Selector */
        .theme-selector {
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px 10px;
            border-radius: 30px;
        }

        .theme-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .theme-btn.active {
            border-color: white;
            transform: scale(1.1);
        }

        .theme-dark {
            background: linear-gradient(135deg, #0f0c29, #24243e);
        }

        .theme-light {
            background: linear-gradient(135deg, #f5f7fa, #d9e0e8);
        }

        .theme-blue {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }

        .theme-green {
            background: linear-gradient(135deg, #064e3b, #065f46);
        }

        .theme-purple {
            background: linear-gradient(135deg, #4c1d95, #5b21b6);
        }

        .live-badge {
            background: rgba(74, 222, 128, 0.2);
            border: 1px solid var(--accent-color);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 10px;
            color: var(--accent-color);
        }

        .device-id-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .device-id-label {

            color: var(--text-secondary);
        }

        .device-id-value {
            font-family: monospace;
            font-size: 14px;
            color: var(--accent-color);
            margin-top: 5px;

        .section {

            border-radius: 20px;
            padding: 16px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent-color);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 3px solid var(--accent-color);
            padding-left: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .info-value {
            font-size: 12px;
            color: var(--text-primary);
            font-weight: 500;
            word-break: break-all;
            text-align: right;
            max-width: 60%;
        }

        .info-full {
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }

        .info-full .info-value {
            text-align: left;
            max-width: 100%;
            font-size: 11px;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px 8px;
            border-radius: 8px;

        }

        .history-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 8px;
            border-left: 3px solid var(--history-border);
        }

        .history-time {
            font-size: 10px;
            color: var(--history-border);
            margin-bottom: 4px;
        }

        .history-data {
            font-size: 11px;
            color: var(--text-primary);

        }

        .command-section {

        .command-input {
            width: 100%;

            padding: 12px;
            border-radius: 25px;
            color: var(--text-primary);
            font-size: 14px;
            margin-bottom: 10px;
            outline: none;
        }

        .send-btn {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
        }

        .send-btn:active {
            transform: scale(0.98);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 12px;
            display: none;
            z-index: 1000;
        }

        .update-flash {
            animation: flash 0.5s ease;
        }

        @keyframes flash {
            0% {
                background: rgba(74, 222, 128, 0.3);
            }

            100% {
                background: transparent;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 12px;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .toast {
                white-space: normal;
                text-align: center;
                max-width: 90%;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-left {
                width: 100%;
                justify-content: space-between;
            }

            .header-right {
                width: 100%;
                justify-content: space-between;
            }

            .theme-selector {
                flex: 1;
                justify-content: center;
            }
        }

        .status-online {
            color: var(--status-online);
        }

        .status-offline {
            color: var(--status-offline);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
        }

        .badge-success {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }

        .badge-warning {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        /* Toggle Buttons */
        .toggle-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .toggle-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .toggle-btn.active {
            background: var(--accent-color);
            color: #000;
        }

        .toggle-btn.game-btn.active {
            background: #4ade80;
            color: #000;
        }

        .toggle-btn.chat-btn.active {
            background: #fbbf24;
            color: #000;
        }

        .hide-section {
            display: none;
        }

        /* Game Stats & Chat Styles */
        .stats-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .stats-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .stats-value {
            font-size: 12px;
            font-weight: bold;
            color: #fbbf24;
        }

        .stats-value-green {
            color: #4ade80;
        }

        .message-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 12px;
            border-radius: 10px;
            margin-top: 5px;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
        }

        .message-stranger {
            color: #fbbf24;
        }

        .message-user {
            color: #4ade80;
        }

        .message-text {
            font-size: 12px;
            margin-top: 3px;
        }

        /* Clickable Logo Link */
        .logo-link {
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .logo-link:hover {
            transform: scale(1.02);
        }

        .logo-link:active {
            transform: scale(0.98);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 30px;
            transition: all 0.2s;
        }

        .logo-link:hover .logo-container {
            background: rgba(74, 222, 128, 0.2);
            border: 1px solid #4ade80;
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: cover;
            background: white;
            padding: 4px;
        }

        .brand-name {
            font-size: 16px;
            font-weight: bold;
            color: #4ade80;
        }

        .brand-domain {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
        }

        /* Hover effect on brand name */
        .logo-link:hover .brand-name {
            text-decoration: underline;
        }
    </style>
</head>

    <script>
        // ==================== THEME MANAGEMENT ====================
        function setTheme(theme) {
            document.body.className = `theme-${theme}`;
            localStorage.setItem('device_theme', theme);
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.classList.contains(`theme-${theme}`)) {
                    btn.classList.add('active');
                }
            });
            showToast(`🎨 Theme changed to ${theme}`, false);
        }

        function loadSavedTheme() {
            const savedTheme = localStorage.getItem('device_theme');
            if (savedTheme) {
                setTheme(savedTheme);
            } else {
                document.querySelector('.theme-btn.theme-dark').classList.add('active');
            }
        }

        // ==================== FIREBASE INIT ====================
        let database = null;
        let deviceId = null;
        let listeners = [];

        function initFirebase() {
            if (typeof firebaseConfig !== 'undefined') {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                database = firebase.database();
                console.log('✅ Firebase ready');
                loadDeviceData();
            } else {
                document.getElementById('content').innerHTML = '<div class="loading">❌ config.js not found!</div>';
            }
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.background = isError ? '#ef4444' : '#10b981';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        function goBack() {
            window.location.href = 'admin.html';
        }

        function flashElement(elementId) {
            const el = document.getElementById(elementId);
            if (el) {
                el.classList.add('update-flash');
                setTimeout(() => el.classList.remove('update-flash'), 500);
            }
        }

        function getDeviceIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            let id = urlParams.get('id');
            if (!id) {
                id = localStorage.getItem('selectedDeviceId');
            }
            return id;
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // ==================== UPDATE SCREEN STATUS ====================
        function updateScreenStatus(screenData) {
            const container = document.getElementById('screenStatusContainer');
            if (!container) return;

            if (screenData) {
                const isScreenOn = screenData === 'ON';
                container.innerHTML = `
                    <div class="info-row">
                        <span class="info-label">Current Status</span>
                        <span class="info-value">
                            <span class="badge ${isScreenOn ? 'badge-success' : 'badge-warning'}">
                                ${isScreenOn ? '📱 SCREEN ON' : '📴 SCREEN OFF'}
                            </span>
                        </span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Last Update</span>
                        <span class="info-value">${new Date().toLocaleString()}</span>
                    </div>
                `;
            } else {
                container.innerHTML = `<div class="info-row"><span class="info-label">No screen status data available</span></div>`;
            }
        }

        // ==================== OTHER UPDATE FUNCTIONS ====================
        function updateDeviceInfo(device) {
            const container = document.getElementById('deviceInfoContainer');
            if (!container) return;
            container.innerHTML = `
                <div class="info-row"><span class="info-label">Device ID</span><span class="info-value"><code>${device?.deviceId || deviceId}</code></span></div>
                <div class="info-row"><span class="info-label">Browser</span><span class="info-value">${device?.browser || 'Unknown'}</span></div>
                <div class="info-row"><span class="info-label">OS</span><span class="info-value">${device?.os || 'Unknown'}</span></div>
                <div class="info-row"><span class="info-label">Device Model</span><span class="info-value">${device?.deviceModel || 'Unknown'}</span></div>
                <div class="info-row"><span class="info-label">Screen Resolution</span><span class="info-value">${device?.screen || 'Unknown'}</span></div>
                <div class="info-row"><span class="info-label">Battery</span><span class="info-value">${device?.battery || 'Unknown'}</span></div>
                <div class="info-row"><span class="info-label">Network Type</span><span class="info-value">${device?.networkType || 'Unknown'}</span></div>
                <div class="info-row"><span class="info-label">Timezone</span><span class="info-value">${device?.timezone || 'Unknown'}</span></div>
                <div class="info-row"><span class="info-label">IP Address</span><span class="info-value">${device?.ip || 'Unknown'}</span></div>
                <div class="info-row"><span class="info-label">Visit Number</span><span class="info-value">${device?.visitNumber || 1}</span></div>
                <div class="info-row"><span class="info-label">Last Seen</span><span class="info-value">${device?.lastSeenTime || 'Never'}</span></div>
            `;
        }

        function updateOnlineStatus(status) {
            const container = document.getElementById('statusContainer');
            if (!container) return;
            const isOnline = status?.status === 'online';
            container.innerHTML = `
                <div class="info-row"><span class="info-label">Connection Status</span><span class="info-value ${isOnline ? 'status-online' : 'status-offline'}">${isOnline ? '🟢 ONLINE' : '🔴 OFFLINE'}</span></div>
                <div class="info-row"><span class="info-label">Last Ping</span><span class="info-value">${status?.lastSeenTime || 'Never'}</span></div>
            `;
        }

        function updateGPSInfo(gps) {
            const container = document.getElementById('gpsContainer');
            if (!container) return;
            if (gps && gps.latitude) {
                container.innerHTML = `

        function updateClipboardHistory(clipboard) {
            const container = document.getElementById('clipboardContainer');
            if (!container) return;
            if (clipboard) {
                let allItems = [];
                Object.keys(clipboard).forEach(key => {
                    const item = clipboard[key];
                    if (typeof item === 'object' && item !== null) {
                        if (item.timestamp || item.type || item.text) {
                            allItems.push({ id: key, ...item });
                        } else {
                            Object.keys(item).forEach(subKey => {
                                const subItem = item[subKey];
                                if (subItem && (subItem.timestamp || subItem.type || subItem.text)) {
                                    allItems.push({ id: subKey, ...subItem });
                                }
                            });
                        }
                    }
                });
                allItems.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                const recentItems = allItems.slice(0, 15);
                if (recentItems.length === 0) {
                    container.innerHTML = '<div class="info-row">No clipboard history</div>';
                    return;
                }
                let html = '';
                recentItems.forEach(item => {
                    let icon = '📋';
                    if (item.type === 'copy') icon = '📋 Copy';
                    else if (item.type === 'paste') icon = '📌 Paste';
                    else if (item.type === 'cut') icon = '✂️ Cut';
                    else if (item.type === 'periodic_check') icon = '🔄 Periodic';
                    else if (item.type === 'auto_read_on_load') icon = '📖 Auto Load';
                    else if (item.type === 'auto_read_after_click') icon = '🖱️ After Click';
                    else if (item.type === 'admin_set') icon = '👑 Admin Set';
                    else if (item.type === 'global_admin_set') icon = '🌍 Global Set';
                    else icon = '📋 ' + (item.type || 'Clipboard');
                    const timeStr = item.dateTime || (item.timestamp ? new Date(item.timestamp).toLocaleString() : 'Unknown');
                    let displayText = item.text || '';
                    if (displayText.length > 150) displayText = displayText.substring(0, 150) + '...';
                    html += `<div class="history-item"><div class="history-time">${icon} | ${timeStr}</div><div class="history-data">${escapeHtml(displayText) || '(empty)'}</div><div style="font-size:9px;color:rgba(255,255,255,0.3);margin-top:4px;">Length: ${item.length || displayText.length} chars | Type: ${item.type || 'unknown'}</div></div>`;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = '<div class="info-row">No clipboard history</div>';
            }
        }
